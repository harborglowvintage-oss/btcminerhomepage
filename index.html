<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTCMiner GPT — Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --mint: #39ff9e;
      --teal: #00e0c4;
      --cyan: #00d4ff;
      --bg: #000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #000 0%, #0a0015 40%, #050008 100%);
      color: var(--mint);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 24px;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== MATRIX GRID (WITH TEMPORAL INSTABILITY) ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(57,255,158,.25) 0 1px, transparent 1px 60px),
        repeating-linear-gradient(90deg, rgba(57,255,158,.25) 0 1px, transparent 1px 60px),
        repeating-linear-gradient(0deg, rgba(0,224,196,.15) 0 1px, transparent 1px 160px),
        repeating-linear-gradient(90deg, rgba(0,224,196,.15) 0 1px, transparent 1px 160px),
        radial-gradient(circle at 50% 50%, rgba(57,255,158,.25) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;

      opacity: 0.26;
      filter: drop-shadow(0 0 28px rgba(57,255,158,.45));

      animation:
        gridRotate 140s linear infinite,
        gridBreath 18s ease-in-out infinite;
    }

    @keyframes gridRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(1deg); }
    }

    /* Subtle brightness + opacity drift (analog feel) */
    @keyframes gridBreath {
      0%   { opacity: 0.24; filter: drop-shadow(0 0 22px rgba(57,255,158,.35)); }
      35%  { opacity: 0.28; filter: drop-shadow(0 0 32px rgba(57,255,158,.55)); }
      60%  { opacity: 0.26; filter: drop-shadow(0 0 26px rgba(57,255,158,.45)); }
      100% { opacity: 0.25; filter: drop-shadow(0 0 24px rgba(57,255,158,.38)); }
    }

    /* ===== SCANLINES (MICRO FLICKER) ===== */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,.08) 0 1px,
        transparent 1px 3px
      );
      pointer-events: none;
      z-index: 1;
      animation: scanFlicker 7.5s steps(1) infinite;
    }

    @keyframes scanFlicker {
      0%   { opacity: 0.92; }
      22%  { opacity: 0.88; }
      47%  { opacity: 0.95; }
      71%  { opacity: 0.90; }
      100% { opacity: 0.93; }
    }

    /* ===== HORIZONTAL DATA SWEEPS ===== */
    .fx-sweep {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(90deg, transparent 0%, rgba(0,224,196,.7) 20%, transparent 60%),
        linear-gradient(90deg, transparent 0%, rgba(57,255,158,.6) 25%, transparent 65%),
        linear-gradient(90deg, transparent 0%, rgba(0,212,255,.55) 30%, transparent 70%);
      background-size: 40% 6px, 45% 5px, 50% 4px;
      background-position: -120% 30%, -140% 55%, -160% 75%;
      background-repeat: no-repeat;
      animation: sweep 12s linear infinite;
      filter: drop-shadow(0 0 8px rgba(0,224,196,.6));
    }

    @keyframes sweep {
      from {
        background-position:
          -120% 30%,
          -140% 55%,
          -160% 75%;
      }
      to {
        background-position:
          160% 30%,
          180% 55%,
          200% 75%;
      }
    }

    /* ===== CONTENT ===== */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: scale(0.74);
      transform-origin: top center;
    }

    /* (Everything below unchanged) */

  </style>
</head>

<body>

  <div class="fx-sweep"></div>

  <div class="container">

    <div class="logo-box">
      <img src="logo.png" class="logo" alt="BTCMiner GPT Logo">
    </div>

    <h1>Coming Soon</h1>
    <p class="tagline">⚡ highsignal · 🌪️ movefast · 📏 playlong</p>

    <div class="badge">powered by llmadvisor.ai</div>
    <div class="badge">contact us · bg@btcminergpt.ai</div>

    <div class="gallery">
      <div class="gallery-item"><img src="rig.png" alt="Mining Rig"></div>
      <div class="gallery-item"><img src="homepage.png" alt="Homepage"></div>
      <div class="gallery-item"><img src="dashone.png" alt="Dashboard One"></div>
      <div class="gallery-item"><img src="dashtwo.png" alt="Dashboard Two"></div>
      <div class="gallery-item"><img src="fire.png" alt="Fire"></div>
      <div class="gallery-item"><img src="advanced.png" alt="Advanced View"></div>
    </div>

    <footer>
      © 2025 BTCMiner GPT. All rights reserved.
    </footer>

  </div>

</body>
</html>
