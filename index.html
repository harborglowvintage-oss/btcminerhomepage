<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTCMiner GPT — Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --mint: #39ff9e;
      --teal: #00e0c4;
      --cyan: #00d4ff;
      --bg: #000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #000 0%, #0a0015 40%, #050008 100%);
      color: var(--mint);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 24px;
      overflow-x: hidden;
      position: relative;
    }

    body::before { /* unchanged */ }
    body::after { /* unchanged */ }

    .fx-sweep { /* unchanged */ }

    @keyframes sweep {
      from {
        background-position: -120% 30%, -140% 55%, -160% 75%;
      }
      to {
        background-position: 160% 30%, 180% 55%, 200% 75%;
      }
    }

    .bolt { /* unchanged */ }
    @keyframes boltFlash { /* unchanged */ }
    .bolt svg { /* unchanged */ }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: scale(0.74);
      transform-origin: top center;
    }

    /* 🧨 NEW: Aggressive Smoke Layer */
    #logo-smoke {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 420px;
      z-index: 9; /* behind logo-box */
      pointer-events: none;
      overflow: visible;
    }

    #logo-smoke::before, #logo-smoke::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 70%);
      animation: puff 2.4s infinite ease-in-out alternate;
      opacity: 0.35;
      filter: blur(20px);
      mix-blend-mode: screen;
    }

    #logo-smoke::after {
      animation-delay: 1.2s;
    }

    @keyframes puff {
      0% {
        transform: scale(1) translateY(0) rotate(0deg);
        opacity: 0.4;
      }
      100% {
        transform: scale(2.2) translateY(-80px) rotate(360deg);
        opacity: 0;
      }
    }

    .logo-box {
      padding: 60px;
      border-radius: 24px;
      border: 2px solid var(--teal);
      background: linear-gradient(135deg, rgba(0,28,34,.45), rgba(8,10,12,.65));
      box-shadow:
        0 0 70px rgba(0,224,196,.35),
        inset 0 0 40px rgba(0,224,196,.1);
      margin-bottom: 40px;
      text-align: center;
      position: relative;
    }

    img.logo {
      width: 420px;
      max-width: 90vw;
      filter:
        drop-shadow(0 0 32px rgba(0,224,196,.6))
        drop-shadow(0 0 55px rgba(57,255,158,.35));
    }

    h1, .tagline, .badge, .gallery, footer {
      /* unchanged */
    }

    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 18px rgba(0,224,196,.25); }
      50% { box-shadow: 0 0 32px rgba(0,224,196,.45), 0 0 45px rgba(57,255,158,.2); }
    }

    .gallery, .gallery-item, .gallery-item:hover, .gallery-item img {
      /* unchanged */
    }

    footer {
      margin-top: 90px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      color: rgba(138,43,226,.4);
    }
  </style>
</head>

<body>

  <div class="fx-sweep"></div>

  <div class="container">

    <!-- 🧨 NEW SMOKE LAYER HERE -->
    <div id="logo-smoke"></div>

    <div class="logo-box">
      <img src="logo.png" class="logo" alt="BTCMiner GPT Logo">
    </div>

    <h1>Coming Soon</h1>
    <p class="tagline">⚡ highsignal · 🌪️ movefast · 📏 playlong</p>

    <div class="badge">powered by llmadvisor.ai</div>
    <div class="badge">contact us · bg@btcminergpt.ai</div>

    <div class="gallery">
      <div class="gallery-item"><img src="rig.png" alt="rig"></div>
      <div class="gallery-item"><img src="homepage.png" alt="homepage"></div>
      <div class="gallery-item"><img src="dashone.png" alt="dashone"></div>
      <div class="gallery-item"><img src="dashtwo.png" alt="dashtwo"></div>
      <div class="gallery-item"><img src="fire.png" alt="fire"></div>
      <div class="gallery-item"><img src="advanced.png" alt="advanced"></div>
    </div>

    <footer>
      © 2025 BTCMiner GPT. All rights reserved.
    </footer>

  </div>

  <script>
    const colors = [
      {fill: '#00e0c4', stroke: '#39ff9e'},
      {fill: '#39ff9e', stroke: '#00d4ff'},
      {fill: '#00d4ff', stroke: '#00e0c4'}
    ];

    const boltSVG = (c = colors[Math.floor(Math.random() * colors.length)]) => `
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/>
      </svg>
    `;

    function createBolt() {
      const bolt = document.createElement('div');
      bolt.className = 'bolt';
      bolt.innerHTML = boltSVG();
      
      const isXAxis = Math.random() < 0.5;
      
      if (isXAxis) {
        const isTop = Math.random() < 0.5;
        bolt.style.left = Math.random() * 100 + '%';
        bolt.style.top = isTop ? '0' : 'auto';
        bolt.style.bottom = isTop ? 'auto' : '0';
      } else {
        const isLeft = Math.random() < 0.5;
        bolt.style.top = Math.random() * 100 + '%';
        bolt.style.left = isLeft ? '0' : 'auto';
        bolt.style.right = isLeft ? 'auto' : '0';
      }
      
      document.body.appendChild(bolt);
      setTimeout(() => bolt.remove(), 300);
    }

    function scheduleBolts() {
      createBolt();
      setTimeout(scheduleBolts, 2000 + Math.random() * 5000);
    }

    scheduleBolts();
  </script>

</body>
</html>
