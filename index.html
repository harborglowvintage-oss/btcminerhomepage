  <style>
    :root {
      --mint: #39ff9e;
      --teal: #00e0c4;
      --cyan: #00d4ff;
      --bg: #000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: linear-gradient(180deg, #000 0%, #0a0015 40%, #050008 100%);
      color: var(--mint);
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 60px 16px;
      position: relative;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .crt-overlay {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(57,255,158,0.05) 0%, transparent 80%),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: screen;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      animation: gridRotate 140s linear infinite;
      opacity: 0.34;
      filter: drop-shadow(0 0 34px rgba(57,255,158,.5));
      background-image:
        repeating-linear-gradient(0deg, rgba(57,255,158,.22) 0 1px, transparent 1px 50px),
        repeating-linear-gradient(90deg, rgba(57,255,158,.22) 0 1px, transparent 1px 50px),
        repeating-linear-gradient(0deg, rgba(0,224,196,.1) 0 1px, transparent 1px 25px),
        repeating-linear-gradient(90deg, rgba(0,224,196,.1) 0 1px, transparent 1px 25px),
        repeating-linear-gradient(45deg, rgba(0,212,255,0.06) 0 1px, transparent 1px 30px),
        repeating-linear-gradient(-45deg, rgba(0,212,255,0.06) 0 1px, transparent 1px 30px),
        radial-gradient(circle at 50% 50%, rgba(57,255,158,.18) 0%, transparent 60%);
    }

    @keyframes gridRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(1deg); }
    }

    .fx-sweep {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(90deg, transparent 0%, rgba(0,224,196,.7) 20%, transparent 60%),
        linear-gradient(90deg, transparent 0%, rgba(57,255,158,.6) 25%, transparent 65%),
        linear-gradient(90deg, transparent 0%, rgba(0,212,255,.55) 30%, transparent 70%);
      background-size: 40% 6px, 45% 5px, 50% 4px;
      background-position: -120% 30%, -140% 55%, -160% 75%;
      background-repeat: no-repeat;
      animation: sweep 12s linear infinite;
      filter: drop-shadow(0 0 8px rgba(0,224,196,.6));
    }

    @keyframes sweep {
      from {
        background-position: -120% 30%, -140% 55%, -160% 75%;
      }
      to {
        background-position: 160% 30%, 180% 55%, 200% 75%;
      }
    }

    .bolt {
      position: fixed;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: boltFlash 0.3s ease-in-out;
    }

    @keyframes boltFlash {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .bolt svg {
      filter: drop-shadow(0 0 8px var(--teal)) drop-shadow(0 0 15px var(--cyan));
    }

    .container {
      position: relative;

    .magnetar-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      transform: translate(-50%, -50%);
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
    }

    .core-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid;
      animation: pulsate 3s ease-in-out infinite;
    }

    .core-ring:nth-child(1) {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-color: rgba(0,224,196,0.6);
      animation-delay: 0s;
    }

    .core-ring:nth-child(2) {
      top: 10%;
      left: 10%;
      width: 80%;
      height: 80%;
      border-color: rgba(57,255,158,0.5);
      animation-delay: 0.5s;
    }

    .core-ring:nth-child(3) {
      top: 20%;
      left: 20%;
      width: 60%;
      height: 60%;
      border-color: rgba(0,212,255,0.4);
      animation-delay: 1s;
    }

    @keyframes pulsate {
      0%, 100% {
        transform: scale(1);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.15);
        opacity: 0.7;
      }
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #39ff9e;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
      box-shadow: 0 0 8px #39ff9e;
      animation: float linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(0) translateX(0);
        opacity: 1;
      }
      to {
        transform: translateY(-100vh) translateX(var(--drift));
        opacity: 0;
      }
    }

    .energy-beam {
      position: absolute;
      width: 2px;
      height: 60px;
      background: linear-gradient(180deg, #00e0c4, transparent);
      animation: beam 2s linear infinite;
      pointer-events: none;
      z-index: 2;
      filter: blur(1px);
      box-shadow: 0 0 10px #00e0c4;
    }

    @keyframes beam {
      from {
        transform: translateY(-100px);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      80% {
        opacity: 1;
      }
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
    }

.tracker-label {

    .pulse-dot {

      background: #39ff9e;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 8px #39ff9e;

    @keyframes pulse {
      0%, 100% {

    .loading {

    .error {

    .api-source {

    /* ===== END MAGNETAR TRACKER STYLES ===== */

    .gallery {

    @media (max-width: 600px) {
      .logo-box {
        padding: 40px 16px;

  </style>
</head>

  <script>
    const boltSVG = `
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="#00e0c4" stroke="#39ff9e" stroke-width="1.5"/>
      </svg>
    `;

    function createBolt() {
      const bolt = document.createElement('div');
      bolt.className = 'bolt';
      bolt.innerHTML = boltSVG;

      const isXAxis = Math.random() < 0.5;
      if (isXAxis) {
        const isTop = Math.random() < 0.5;
        bolt.style.left = Math.random() * 100 + '%';
        bolt.style.top = isTop ? '0' : 'auto';
        bolt.style.bottom = isTop ? 'auto' : '0';
      } else {
        const isLeft = Math.random() < 0.5;
        bolt.style.top = Math.random() * 100 + '%';
        bolt.style.left = isLeft ? '0' : 'auto';
        bolt.style.right = isLeft ? 'auto' : '0';
      }

      document.body.appendChild(bolt);
      setTimeout(() => bolt.remove(), 300);
    }

    function scheduleBolts() {
      createBolt();
      const nextDelay = 2000 + Math.random() * 5000;
      setTimeout(scheduleBolts, nextDelay);
    }

    scheduleBolts();

    // ===== MAGNETAR BTC TRACKER - CORS-FRIENDLY VERSION =====
    
    // Using CryptoCompare API - free, no key required, CORS enabled
    const API_URL = 'https://min-api.cryptocompare.com/data/pricemultifull?fsyms=BTC&tsyms=USD';
    let updateInterval;

    // Create floating particles
    function createParticles() {
      const container = document.querySelector('.magnetar-container');
      if (!container) return;
      
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.bottom = '-10px';
          particle.style.setProperty('--drift', (Math.random() - 0.5) * 200 + 'px');
          particle.style.animationDuration = (5 + Math.random() * 5) + 's';
          particle.style.animationDelay = (Math.random() * 2) + 's';
          container.appendChild(particle);

          setTimeout(() => particle.remove(), 12000);
        }, i * 500);
      }
    }

    // Create energy beams
    function createBeams() {
      const container = document.querySelector('.magnetar-container');
      if (!container) return;
      
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const beam = document.createElement('div');
          beam.className = 'energy-beam';
          beam.style.left = (20 + Math.random() * 60) + '%';
          beam.style.animationDuration = (2 + Math.random() * 2) + 's';
          beam.style.animationDelay = (Math.random() * 2) + 's';
          container.appendChild(beam);

          setTimeout(() => beam.remove(), 6000);
        }, i * 800);
      }
    }

    // Fetch BTC price using CORS-enabled API
    async function fetchBTCPrice() {
      try {
        console.log('Fetching BTC price from CryptoCompare...');
        
        const response = await fetch(API_URL, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        console.log('API Response:', data);
        
        if (data.RAW && data.RAW.BTC && data.RAW.BTC.USD) {
          const btcData = data.RAW.BTC.USD;
          displayPrice(btcData);
          updateStats(btcData);
          updateTimestamp();
        } else {
          throw new Error('Invalid API response structure');
        }
        
      } catch (error) {
        console.error('Error fetching BTC price:', error);
        displayError(error.message);
        
        // Retry after 5 seconds
        setTimeout(fetchBTCPrice, 5000);
      }
    }

    function displayPrice(data) {
      const price = data.PRICE;
      const change24h = data.CHANGEPCT24HOUR;
      
      const isPositive = change24h >= 0;
      const arrow = isPositive ? '▲' : '▼';
      const changeClass = isPositive ? 'positive' : 'negative';
      
      const priceHTML = `
        <div class="price-display">$${price.toLocaleString('en-US', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        })}</div>
        <div class="price-change ${changeClass}">
          <span class="arrow">${arrow}</span>
          <span>${Math.abs(change24h).toFixed(2)}%</span>
          <span style="opacity: 0.6; font-size: 0.85em;">24h</span>
        </div>
        <div class="api-source">source: CryptoCompare</div>
      `;
      
      const container = document.getElementById('priceContainer');
      if (container) container.innerHTML = priceHTML;
    }

    function updateStats(data) {
      const marketCap = data.MKTCAP;
      const volume24h = data.TOTALVOLUME24HTO;
      const high24h = data.HIGH24HOUR;
      const low24h = data.LOW24HOUR;
      
      const statsHTML = `
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Market Cap</div>
            <div class="stat-value">$${formatNumber(marketCap)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">24h Volume</div>
            <div class="stat-value">$${formatNumber(volume24h)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">24h High</div>
            <div class="stat-value">$${formatNumber(high24h)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">24h Low</div>
            <div class="stat-value">$${formatNumber(low24h)}</div>
          </div>
        </div>
      `;
      
      const container = document.getElementById('statsContainer');
      if (container) container.innerHTML = statsHTML;
    }

    function formatNumber(num) {
      if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
      return num.toLocaleString('en-US', { maximumFractionDigits: 2 });
    }

    function updateTimestamp() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit'
      });
      const timeEl = document.getElementById('updateTime');
      if (timeEl) timeEl.textContent = `Last sync: ${timeString}`;
    }

    function displayError(errorMsg) {
      const container = document.getElementById('priceContainer');
      if (container) {
        container.innerHTML = `
          <div class="error">
            ⚠️ Connection issue detected<br>
            <small>${errorMsg}</small><br>
            <small>Retrying quantum link...</small>
          </div>
        `;
      }
    }

    // Initialize BTC tracker
    function initTracker() {
      console.log('=== Magnetar BTC Tracker Initializing ===');
      fetchBTCPrice();
      createParticles();
      createBeams();
      
      // Update price every 30 seconds
      updateInterval = setInterval(fetchBTCPrice, 30000);
      
      // Recreate particles and beams periodically
      setInterval(createParticles, 10000);
      setInterval(createBeams, 8000);
    }

    // Start when page loads
    window.addEventListener('load', () => {
      initTracker();
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (updateInterval) clearInterval(updateInterval);
    });
  </script>
</body>
</html>
