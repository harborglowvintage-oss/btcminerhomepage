<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTCMiner GPT — Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --mint: #39ff9e;
      --teal: #00e0c4;
      --cyan: #00d4ff;
      --bg: #000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #000 0%, #0a0015 40%, #050008 100%);
      color: var(--mint);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 80px 24px;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== MATRIX GRID ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(57,255,158,.25) 0 1px, transparent 1px 60px),
        repeating-linear-gradient(90deg, rgba(57,255,158,.25) 0 1px, transparent 1px 60px),
        repeating-linear-gradient(0deg, rgba(0,224,196,.15) 0 1px, transparent 1px 160px),
        repeating-linear-gradient(90deg, rgba(0,224,196,.15) 0 1px, transparent 1px 160px),
        radial-gradient(circle at 50% 50%, rgba(57,255,158,.25) 0%, transparent 45%);
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
      animation: gridRotate 140s linear infinite;
      filter: drop-shadow(0 0 28px rgba(57,255,158,.45));
    }

    @keyframes gridRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(1deg); }
    }

    /* ===== SCANLINES ===== */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,.08) 0 1px,
        transparent 1px 3px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ===== DATA SWEEPS ===== */
    .fx-sweep {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(90deg, transparent 0%, rgba(0,224,196,.7) 20%, transparent 60%),
        linear-gradient(90deg, transparent 0%, rgba(57,255,158,.6) 25%, transparent 65%),
        linear-gradient(90deg, transparent 0%, rgba(0,212,255,.55) 30%, transparent 70%);
      background-size: 40% 6px, 45% 5px, 50% 4px;
      background-position: -120% 30%, -140% 55%, -160% 75%;
      background-repeat: no-repeat;
      animation: sweep 12s linear infinite;
      filter: drop-shadow(0 0 8px rgba(0,224,196,.6));
    }

    @keyframes sweep {
      from {
        background-position:
          -120% 30%,
          -140% 55%,
          -160% 75%;
      }
      to {
        background-position:
          160% 30%,
          180% 55%,
          200% 75%;
      }
    }

    /* ===== CONTENT ===== */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: scale(0.74);
      transform-origin: top center;
    }

    .logo-box {
      padding: 60px;
      border-radius: 24px;
      border: 2px solid var(--teal);
      background: linear-gradient(135deg, rgba(0,28,34,.45), rgba(8,10,12,.65));
      box-shadow:
        0 0 70px rgba(0,224,196,.35),
        inset 0 0 40px rgba(0,224,196,.1);
      margin-bottom: 40px;
      text-align: center;
    }

    img.logo {
      width: 420px;
      max-width: 90vw;
      filter:
        drop-shadow(0 0 32px rgba(0,224,196,.6))
        drop-shadow(0 0 55px rgba(57,255,158,.35));
    }

    .affiliate-note {
      margin-top: 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .9rem;
      letter-spacing: .08em;
      color: rgba(57,255,158,.7);
    }

    .affiliate-note a {
      color: var(--mint);
      text-decoration: none;
      border-bottom: 1px dashed var(--mint);
    }

    h1 {
      font-size: clamp(3rem, 8vw, 4.2rem);
      letter-spacing: .14em;
      color: #eafffb;
      text-shadow:
        0 0 14px var(--teal),
        0 0 40px var(--cyan);
      margin-bottom: 14px;
    }

    .tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      letter-spacing: .18em;
      margin-bottom: 26px;
      color: var(--teal);
    }

    /* ===== BADGES ===== */
    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.35rem;
      color: var(--teal);
      background: rgba(0,224,196,.12);
      border: 1px solid rgba(0,224,196,.3);
      padding: 12px 30px;
      border-radius: 22px;
      margin-bottom: 18px;
      letter-spacing: 0.08em;
      text-shadow: 0 0 8px var(--teal);
      box-shadow: 0 0 18px rgba(0,224,196,.25);
    }

    /* ===== GALLERY ===== */
    .gallery {
      width: 100%;
      max-width: 1500px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
      gap: 36px;
    }

    .gallery-item {
      aspect-ratio: 4 / 3;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(8,10,12,.85), rgba(20,15,30,.6));
      box-shadow:
        0 10px 50px rgba(0,0,0,.75),
        inset 0 0 30px rgba(0,224,196,.08);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    footer {
      margin-top: 90px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      color: rgba(138,43,226,.4);
    }
  </style>
</head>

<body>

  <div class="fx-sweep"></div>

  <div class="container">

    <div class="logo-box">
      <img src="logo.png" class="logo" alt="BTCMiner GPT Logo">
      <div class="affiliate-note">
        powered by <a href="https://llmadvisor.ai" target="_blank">llmadvisor.ai</a>
      </div>
    </div>

    <h1>Coming Soon</h1>
    <p class="tagline">⚡ highsignal · 🌪️ movefast · 📏 playlong</p>

    <div class="badge">contact us · bg@btcminergpt.ai</div>

    <div class="gallery">
      <div class="gallery-item"><img src="rig.png" alt="rig"></div>
      <div class="gallery-item"><img src="homepage.png" alt="homepage"></div>
      <div class="gallery-item"><img src="dashone.png" alt="dashboard One"></div>
      <div class="gallery-item"><img src="dashtwo.png" alt="dashboard Two"></div>
      <div class="gallery-item"><img src="fire.png" alt="fire"></div>
      <div class="gallery-item"><img src="advanced.png" alt="advanced"></div>
    </div>

    <footer>
      © 2025 BTCMiner GPT. All rights reserved.
    </footer>

  </div>

</body>
</html>
