<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
  <title>BTCMiner GPT — Coming Soon</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

  <style>
    :root {
      --mint: #39ff9e;
      --teal: #00e0c4;
      --cyan: #00d4ff;
      --bg: #000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: linear-gradient(180deg, #000 0%, #0a0015 40%, #050008 100%);
      color: var(--mint);
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 60px 16px;
      position: relative;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    /* CRT Overlay */
    .crt-overlay {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(57,255,158,0.05) 0%, transparent 80%),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: screen;
    }

    /* Enhanced MATRIX Grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      animation: gridRotate 140s linear infinite;
      opacity: 0.34;
      filter: drop-shadow(0 0 34px rgba(57,255,158,.5));
      background-image:
        repeating-linear-gradient(0deg, rgba(57,255,158,.22) 0 1px, transparent 1px 50px),
        repeating-linear-gradient(90deg, rgba(57,255,158,.22) 0 1px, transparent 1px 50px),
        repeating-linear-gradient(0deg, rgba(0,224,196,.1) 0 1px, transparent 1px 25px),
        repeating-linear-gradient(90deg, rgba(0,224,196,.1) 0 1px, transparent 1px 25px),
        repeating-linear-gradient(45deg, rgba(0,212,255,0.06) 0 1px, transparent 1px 30px),
        repeating-linear-gradient(-45deg, rgba(0,212,255,0.06) 0 1px, transparent 1px 30px),
        radial-gradient(circle at 50% 50%, rgba(57,255,158,.18) 0%, transparent 60%);
    }

    @keyframes gridRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(1deg); }
    }

    /* FX Sweep */
    .fx-sweep {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(90deg, transparent 0%, rgba(0,224,196,.7) 20%, transparent 60%),
        linear-gradient(90deg, transparent 0%, rgba(57,255,158,.6) 25%, transparent 65%),
        linear-gradient(90deg, transparent 0%, rgba(0,212,255,.55) 30%, transparent 70%);
      background-size: 40% 6px, 45% 5px, 50% 4px;
      background-position: -120% 30%, -140% 55%, -160% 75%;
      background-repeat: no-repeat;
      animation: sweep 12s linear infinite;
      filter: drop-shadow(0 0 8px rgba(0,224,196,.6));
    }

    @keyframes sweep {
      from {
        background-position: -120% 30%, -140% 55%, -160% 75%;
      }
      to {
        background-position: 160% 30%, 180% 55%, 200% 75%;
      }
    }

    .bolt {
      position: fixed;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: boltFlash 0.3s ease-in-out;
    }

    @keyframes boltFlash {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .bolt svg {
      filter: drop-shadow(0 0 8px var(--teal)) drop-shadow(0 0 15px var(--cyan));
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 12px;
    }

    .logo-box {
      padding: 60px 20px;
      border-radius: 24px;
      border: 2px solid var(--teal);
      background: linear-gradient(135deg, rgba(0,28,34,.45), rgba(8,10,12,.65));
      box-shadow: 0 0 70px rgba(0,224,196,.35), inset 0 0 40px rgba(0,224,196,.1);
      margin-bottom: 40px;
      text-align: center;
    }

    img.logo {
      width: 315px;
      max-width: 70vw;
      height: auto;
      filter: drop-shadow(0 0 32px rgba(0,224,196,.6)) drop-shadow(0 0 55px rgba(57,255,158,.35));
    }

    /* Updated font for Coming Soon */
    h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      letter-spacing: .1em;
      color: #eafffb;
      text-shadow: 0 0 18px var(--teal), 0 0 40px var(--cyan);
    }

    .tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(1.1rem, 4vw, 1.9rem);
      letter-spacing: .18em;
      margin: 20px 0 30px;
      color: var(--teal);
    }

.badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;              /* half size */
  padding: 6px 12px;              /* half padding */
  border-radius: 12px;            /* scale border radius */
  margin-bottom: 12px;            /* slight margin tweak */
  color: var(--teal);
  background: rgba(0,224,196,.12);
  border: 1px solid rgba(0,224,196,.3);
  letter-spacing: 0.08em;
  text-shadow: 0 0 6px var(--teal);
  box-shadow: 0 0 12px rgba(0,224,196,.25);
}


    .gallery {
      width: 100%;
      max-width: 1500px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-top: 60px;
    }

    .gallery-item {
      height: 320px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(8,10,12,.85), rgba(20,15,30,.6));
      box-shadow: 0 10px 50px rgba(0,0,0,.75), inset 0 0 30px rgba(0,224,196,.08);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    footer {
      margin-top: 60px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      color: rgba(57,255,158,.35);
      text-shadow: 0 0 6px rgba(0,224,196,.4);
      text-align: center;
    }

    .gemini-widget {
      position: fixed;
      bottom: 40px;
      right: 40px;
      z-index: 999;
      background: rgba(0, 224, 196, 0.15);
      border: 1px solid rgba(0, 224, 196, 0.3);
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 0 22px rgba(0,224,196,.4);
      backdrop-filter: blur(4px);
      transition: transform 0.3s ease;
    }

    .gemini-widget:hover {
      transform: scale(1.05);
    }

    .gemini-widget img {
      height: 64px;
      width: auto;
      display: block;
      filter: drop-shadow(0 0 8px #00e0c4) drop-shadow(0 0 16px #39ff9e);
    }

    @media (max-width: 960px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .gallery-item {
        height: 220px;
      }

      .gemini-widget {
        bottom: 20px;
        right: 20px;
        padding: 8px;
      }

      .gemini-widget img {
        height: 48px;
      }
    }
  </style>
</head>

<body>
  <div class="crt-overlay"></div>
  <div class="fx-sweep"></div>

  <div class="container">
    <div class="logo-box">
      <img src="logo.png" class="logo" alt="BTCMiner GPT Logo">
    </div>

    <h1>Coming Soon</h1>
    <p class="tagline">⚡ highsignal · 🌪️ movefast · 📏 playlong</p>

    <div class="badge">powered by llmadvisor.ai</div>
    <div class="badge">accepting partnership agreements · contact · bg@btcminergpt.ai</div>

    <div class="gallery">
      <div class="gallery-item"><img src="rig.png" alt="custom mining dashboard"></div>
      <div class="gallery-item"><img src="homepage.png" alt="bitcoin gpu rig"></div>
      <div class="gallery-item"><img src="dashone.png" alt="btc home mining"></div>
      <div class="gallery-item"><img src="dashtwo.png" alt="home mining dashboards"></div>
      <div class="gallery-item"><img src="fire.png" alt="btc consulting"></div>
      <div class="gallery-item"><img src="advanced.png" alt="ai partnership programs"></div>
    </div>

    <footer>© 2025 BTCMiner GPT. All rights reserved.</footer>
  </div>

  <a href="https://creditcard.exchange.gemini.com/credit-card/apply?referral_code=44qnv2qrx"
     target="_blank"
     class="gemini-widget"
     title="Apply for Gemini Credit Card">
    <img src="gemini.png" alt="Gemini Credit Card Application Link">
  </a>

  <script>
    const boltSVG = `
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="#00e0c4" stroke="#39ff9e" stroke-width="1.5"/>
      </svg>
    `;

    function createBolt() {
      const bolt = document.createElement('div');
      bolt.className = 'bolt';
      bolt.innerHTML = boltSVG;

      const isXAxis = Math.random() < 0.5;
      if (isXAxis) {
        const isTop = Math.random() < 0.5;
        bolt.style.left = Math.random() * 100 + '%';
        bolt.style.top = isTop ? '0' : 'auto';
        bolt.style.bottom = isTop ? 'auto' : '0';
      } else {
        const isLeft = Math.random() < 0.5;
        bolt.style.top = Math.random() * 100 + '%';
        bolt.style.left = isLeft ? '0' : 'auto';
        bolt.style.right = isLeft ? 'auto' : '0';
      }

      document.body.appendChild(bolt);
      setTimeout(() => bolt.remove(), 300);
    }

    function scheduleBolts() {
      createBolt();
      const nextDelay = 2000 + Math.random() * 5000;
      setTimeout(scheduleBolts, nextDelay);
    }

    scheduleBolts();
  </script>
</body>
</html>
