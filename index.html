<style>
:root{
  --mint:#39ff9e;
  --teal:#00e0c4;
  --cyan:#00d4ff;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BODY */
body{
  background:linear-gradient(180deg,#000 0%,#0a0015 40%,#050008 100%);
  color:var(--mint);
  font-family:'Orbitron',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:60px 24px;
  overflow-x:hidden;
  position:relative;
}

/* MATRIX GRID */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    repeating-linear-gradient(0deg,rgba(57,255,158,.22) 0 1px,transparent 1px 60px),
    repeating-linear-gradient(90deg,rgba(57,255,158,.22) 0 1px,transparent 1px 60px),
    repeating-linear-gradient(0deg,rgba(0,224,196,.12) 0 1px,transparent 1px 160px),
    repeating-linear-gradient(90deg,rgba(0,224,196,.12) 0 1px,transparent 1px 160px);
  opacity:.26;
  pointer-events:none;
  z-index:0;
  animation:gridRotate 140s linear infinite;
  filter:drop-shadow(0 0 20px rgba(57,255,158,.35));
  transform:scale(.74);
  transform-origin:top center;
}

@keyframes gridRotate{
  from{transform:scale(.74) rotate(0deg)}
  to{transform:scale(.74) rotate(1deg)}
}

/* SCANLINES */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,.08) 0 1px,
    transparent 1px 3px
  );
  pointer-events:none;
  z-index:1;
  transform:scale(.74);
  transform-origin:top center;
}

/* STREAK LAYER */
.streak-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:2;
  transform:scale(.74);
  transform-origin:top center;
}

/* VERTICAL STREAK */
.v-streak{
  position:absolute;
  top:-30%;
  width:2px;
  height:160%;
  background:linear-gradient(
    to bottom,
    transparent 0%,
    rgba(57,255,158,.15) 30%,
    rgba(0,224,196,.55) 60%,
    rgba(255,70,70,.9) 100%
  );
  filter:
    drop-shadow(0 0 10px rgba(0,224,196,.5))
    drop-shadow(0 0 14px rgba(255,70,70,.7));
  animation:vFall linear infinite;
  opacity:.8;
}

/* HORIZONTAL STREAK */
.h-streak{
  position:absolute;
  left:-30%;
  height:2px;
  width:160%;
  background:linear-gradient(
    to right,
    transparent 0%,
    rgba(57,255,158,.15) 30%,
    rgba(0,224,196,.55) 60%,
    rgba(255,70,70,.9) 100%
  );
  filter:
    drop-shadow(0 0 10px rgba(0,224,196,.5))
    drop-shadow(0 0 14px rgba(255,70,70,.7));
  animation:hSweep linear infinite;
  opacity:.8;
}

/* RANDOMIZED TIMING / POSITIONS */
.v-streak:nth-child(1){left:12%;animation-duration:14s;animation-delay:-3s}
.v-streak:nth-child(2){left:38%;animation-duration:18s;animation-delay:-9s}
.v-streak:nth-child(3){left:62%;animation-duration:16s;animation-delay:-6s}
.v-streak:nth-child(4){left:82%;animation-duration:20s;animation-delay:-12s}

.h-streak:nth-child(5){top:22%;animation-duration:15s;animation-delay:-4s}
.h-streak:nth-child(6){top:48%;animation-duration:19s;animation-delay:-10s}
.h-streak:nth-child(7){top:74%;animation-duration:17s;animation-delay:-7s}

@keyframes vFall{
  from{transform:translateY(-40%)}
  to{transform:translateY(120%)}
}

@keyframes hSweep{
  from{transform:translateX(-40%)}
  to{transform:translateX(120%)}
}

/* CONTENT */
.container{
  position:relative;
  z-index:10;
  width:100%;
  max-width:1600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  transform:scale(.74);
  transform-origin:top center;
}

/* LOGO */
.logo-box{
  padding:60px;
  border-radius:24px;
  border:2px solid var(--teal);
  background:linear-gradient(135deg,rgba(0,28,34,.45),rgba(8,10,12,.65));
  box-shadow:0 0 70px rgba(0,224,196,.35);
  margin-bottom:40px;
}

img.logo{
  width:420px;
  max-width:90vw;
  filter:drop-shadow(0 0 32px rgba(0,224,196,.6));
}

h1{
  font-size:clamp(3rem,8vw,4.2rem);
  letter-spacing:.14em;
  color:#eafffb;
  text-shadow:0 0 14px var(--teal),0 0 40px var(--cyan);
  margin-bottom:14px;
}

.tagline{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(1.4rem,4vw,1.9rem);
  letter-spacing:.18em;
  margin-bottom:26px;
  color:var(--teal);
}

.badge{
  font-family:'Share Tech Mono',monospace;
  font-size:1.35rem;
  color:var(--teal);
  background:rgba(0,224,196,.12);
  border:1px solid rgba(0,224,196,.3);
  padding:12px 30px;
  border-radius:22px;
  margin-bottom:18px;
  box-shadow:0 0 18px rgba(0,224,196,.25);
}

.gallery{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(520px,1fr));
  gap:36px;
}

.gallery-item{
  aspect-ratio:4/3;
  border-radius:18px;
  overflow:hidden;
  background:#000;
  box-shadow:0 10px 50px rgba(0,0,0,.75);
}

.gallery-item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

footer{
  margin-top:90px;
  font-family:'Share Tech Mono',monospace;
  font-size:.75rem;
  color:rgba(138,43,226,.4);
}
</style>
</head>
